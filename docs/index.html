async function askRag() {
  const input = document.getElementById('ragInput');
  const query = input.value.trim();
  if (!query) return;

  const messages = document.getElementById('ragMessages');
  messages.innerHTML += `<div class="rag-msg user"><span>${esc(query)}</span></div>`;

  // 立即清空输入框（先 blur 再清空，确保视觉效果）
  input.value = '';
  input.blur();
  document.getElementById('ragSend').disabled = true;

  // 检测是否为非知识类闲聊（问候、你是谁、能做什么等）
  const nonKnowledgePatterns = [
    /^(你好|hi|hello|嗨|hey)[!！。.]?$/i,
    /^你是谁/i,
    /^你是[谁什么]/i,
    /^(你能|你会)(做什么|干什么|干嘛)/i,
    /^(谢谢|多谢|感谢|thanks?)/i,
    /^(再见|拜拜|bye|goodbye)/i,
    /^在吗[?？]?$/,
    /^(今天|明天|现在)(天气|怎么样|几号|星期几)/i,
    /^讲个笑话/i,
    /^你(好|真)(聪明|厉害|棒)/i,
    /^你(是|有)(人|意识|感情|灵魂)/i,
  ];
  const isChat = nonKnowledgePatterns.some(p => p.test(query));
  if (isChat) {
    const chatReply = getChatReply(query);
    messages.innerHTML += `<div class="rag-msg assistant">${chatReply}</div>`;
    messages.scrollTop = messages.scrollHeight;
    document.getElementById('ragSend').disabled = false;
    setTimeout(() => { const inp = document.getElementById('ragInput'); if (inp) { inp.value = ''; inp.focus(); } }, 150);
    return;
  }

  const results = searchRag(query);
  const keywords = extractKeywords(query);
  // 扩展同义词用于高亮（用户问"LLM"，高亮时也要标记"大模型"）
  const expandedKw = keywords.length > 0 ? expandSearchTerms(keywords[0]) : [];
  const keywordStr = [...new Set([...keywords, ...expandedKw])].join(' ');

  if (results.length === 0) {
    messages.innerHTML += `<div class="rag-msg assistant"><span class="no-match">📭 抱歉，「${esc(query)}」这个内容目前在我的知识库中还没有收录，无法回答。知识库后续更新后我会自动学习到。</span></div>`;
  } else {
    // 按文档去重
    const seenDocIds = new Set();
    const deduped = [];
    for (const r of results) {
      if (!seenDocIds.has(r.docId)) {
        seenDocIds.add(r.docId);
        deduped.push(r);
      }
    }
    const top = deduped.slice(0, 3);

    // 来源引用（点击用关键词高亮）
    const escapedKw = keywordStr.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    const sourcesHTML = top.map((r) =>
      `<div class="source" onclick="ragOpenDoc('${r.docId}', '${escapedKw}')">📄 ${esc(r.docTitle)}</div>`
    ).join('');

    // 先显示"思考中..."
    const thinkingId = 'thinking-' + Date.now();
    messages.innerHTML += `<div class="rag-msg assistant" id="${thinkingId}"><span class="rag-thinking">🤔 正在从知识库中查找并总结…</span>${sourcesHTML}</div>`;
    messages.scrollTop = messages.scrollHeight;

    // 调用 DeepSeek LLM 总结
    const llmAnswer = await callLLM(top, query);

    const thinkingEl = document.getElementById(thinkingId);
    if (llmAnswer) {
      // 高亮 LLM 回答中的关键词
      let highlightedAnswer = esc(llmAnswer);
      const allKw = [...new Set([...keywords, ...expandedKw])].sort((a, b) => b.length - a.length);
      for (const kw of allKw) {
        if (kw.length >= 2) {
          const regex = new RegExp(`(${escRegex(kw)})`, 'gi');
          highlightedAnswer = highlightedAnswer.replace(regex, '<strong class="kw-highlight">$1</strong>');
        }
      }
      thinkingEl.innerHTML = `<div class="rag-answer-summary"><span class="summary-icon">💡</span> ${highlightedAnswer}</div>${sourcesHTML}`;
    } else {
      // LLM 挂了，fallback 到原文提取
      const topicName = keywords.length > 0 ? keywords[0] : query;
      let fallbackHTML = `<div class="rag-answer-intro">根据你的飞书AI知识库：</div>`;
      const allContent = top.map(r => r.text).join('\n');
      const defSummary = composeSummary(allContent, topicName, keywords);
      if (defSummary) {
        fallbackHTML += `<div class="rag-answer-summary">${defSummary}</div>`;
      }
      thinkingEl.innerHTML = fallbackHTML + sourcesHTML;
    }
  }

  messages.scrollTop = messages.scrollHeight;
  document.getElementById('ragSend').disabled = false;

  // 重新聚焦输入框
  setTimeout(() => {
    const inp = document.getElementById('ragInput');
    if (inp) {
      inp.value = '';
      inp.focus();
    }
  }, 150);
}

// 同义词/别称映射 —— 用户问"LLM"，知识库里写的是"大模型"
function expandSearchTerms(topic) {
  const lower = topic.toLowerCase().trim();
  const terms = [lower];

  const synonymMap = {
    'llm': ['大模型', '大语言模型', '大型语言模型', 'large language model', '语言模型'],
    '大模型': ['llm', '大语言模型', '大型语言模型', 'large language model'],
    '大语言模型': ['llm', '大模型', '大型语言模型', 'large language model'],
    'rag': ['检索增强生成', '检索增强'],
    '检索增强生成': ['rag'],
    'token': ['令牌', '词元', 'tokenize', 'tokenizer', '分词'],
    '词元': ['token', '令牌'],
    'agent': ['智能体', '智能代理', 'agent智能体'],
    '智能体': ['agent', '智能代理'],
    'prompt': ['提示词', '提示', '提示工程', 'prompt engineering'],
    '提示词': ['prompt', '提示', 'prompt engineering'],
    '提示工程': ['prompt', 'prompt engineering'],
    'nlp': ['自然语言处理'],
    '自然语言处理': ['nlp'],
    'gpu': ['显卡', '图形处理器', 'gpu算力'],
    'api': ['接口', '应用程序接口', 'api接口'],
    'embedding': ['嵌入', '向量嵌入', '词嵌入', '词向量', '向量化'],
    '词嵌入': ['embedding', '嵌入', '向量嵌入'],
    '向量': ['vector', 'embedding', '嵌入'],
    '注意力机制': ['attention', '注意力', '自注意力', 'self-attention'],
    'attention': ['注意力机制', '注意力', '自注意力'],
    '微调': ['finetuning', 'fine-tuning', 'fine tuning', 'sft', 'lora'],
    'fine-tuning': ['微调', 'finetuning', 'sft'],
    '预训练': ['pretraining', 'pre-training', 'pre training'],
    'transformer': ['变换器', 'transformer架构'],
    '多模态': ['multimodal', '多模态模型'],
    '上下文窗口': ['context window', '上下文长度', 'context length'],
    'mcp': ['model context protocol', 'mcp协议'],
    'mlp': ['多层感知机', '多层感知器', '前馈网络'],
    '深度学习': ['deep learning', '深度神经网络'],
    '机器学习': ['machine learning', 'ml'],
    '强化学习': ['reinforcement learning', 'rl', 'rlhf'],
    '卷积神经网络': ['cnn', 'convolutional neural network'],
    '循环神经网络': ['rnn', 'recurrent neural network'],
    '生成对抗网络': ['gan', 'generative adversarial network'],
    '迁移学习': ['transfer learning'],
    '过拟合': ['overfitting', 'overfit'],
    '正则化': ['regularization', '正则'],
    '梯度下降': ['gradient descent', 'sgd', 'adam'],
    '激活函数': ['activation function', 'relu', 'sigmoid', 'gelu'],
    '损失函数': ['loss function', '交叉熵', 'cross entropy'],
    '命名实体识别': ['ner', 'named entity recognition'],
    '思维链': ['chain of thought', 'cot', '思维链推理'],
    '少样本学习': ['few-shot', 'few shot learning'],
    '零样本': ['zero-shot', 'zero shot'],
    '扩散模型': ['diffusion model', '扩散', 'stable diffusion'],
    '文生图': ['text-to-image', 'text to image', '图像生成'],
    '文生视频': ['text-to-video', 'text to video'],
    '向量数据库': ['vector database', '向量存储'],
    '知识图谱': ['knowledge graph'],
    '分词器': ['tokenizer', '分词'],
    '监督学习': ['supervised learning'],
    '无监督学习': ['unsupervised learning'],
  };

  for (const [key, syns] of Object.entries(synonymMap)) {
    if (lower === key || lower.includes(key) || key.includes(lower)) {
      terms.push(...syns);
    }
  }

  return [...new Set(terms)];
}

// ==================== DeepSeek LLM 调用 ====================
async function callLLM(contextChunks, question) {
  // 构建上下文：取每个 chunk 的标题+内容
  const contextText = contextChunks.map((c, i) =>
    `[文档${i + 1}: ${c.docTitle}]\n${c.text.substring(0, 1200)}`
  ).join('\n\n');

  const systemPrompt = `你是「Abin AI知识库」的智能助手。你只能根据下面提供的知识库内容回答问题。
规则：
1. 如果知识库中有相关信息，请用自己的话总结回答，语言清晰易懂。
2. 回答时引用原文关键信息，但不要逐字抄。
3. 如果知识库中没有足够信息来回答问题，直接说"知识库中暂未更新相关内容，无法回答"，不要编造任何内容。
4. 回答简洁，控制在200字以内。
5. 始终用中文回答。

知识库内容：
${contextText}`;

  try {
    const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: question }
        ],
        temperature: 0.3,
        max_tokens: 600
      })
    });

    if (!resp.ok) {
      const errText = await resp.text();
      console.error('DeepSeek API error:', resp.status, errText);
      return null;
    }

    const json = await resp.json();
    return json.choices?.[0]?.message?.content?.trim() || null;
  } catch (e) {
    console.error('DeepSeek call failed:', e);
    return null;
  }
}

// 从匹配内容中提取一句话总结（"X是xxx"格式）—— v2：同义词感知 + 智能评分
function composeSummary(allText, topicName, keywords) {
  if (!allText || !topicName) return null;

  const sentences = allText.split(/(?<=[。！？；\n])/g).map(s => s.trim()).filter(s => s.length > 8);
  if (sentences.length === 0) return null;

  // 扩展搜索词：LLM → [LLM, 大模型, 大语言模型, Large Language Model]
  const searchTerms = expandSearchTerms(topicName);
  const allKws = [...new Set([...keywords.map(k => k.toLowerCase()), ...searchTerms])];

  // 对每句话打分，找最佳定义句
  const scored = sentences.map((s, idx) => {
    const lower = s.toLowerCase();
    let score = 0;
    const matchedTermsList = [];

    // 关键词密度
    for (const kw of allKws) {
      if (lower.includes(kw)) {
        score += 6;
        matchedTermsList.push(kw);
      }
    }

    // 定义标记加权
    if (/是[一]?[种个项类位套]/.test(s)) score += 5;
    if (/(?:指的是|即为|定义为|又称|也叫|即[^使便])/.test(s)) score += 5;
    if (/全称|简称/.test(s)) score += 4;
    if (/(?:英文|缩写).{0,6}(?:是|为|叫|：)/.test(s)) score += 3;
    if (/概念|含义|意思是|本质上/.test(s)) score += 2;

    // 句子越靠前，越可能是定义（通常定义在开头）
    if (idx < 3) score += 2;
    if (idx < 1) score += 1;

    return { text: s, score, matchedTerms: matchedTermsList };
  });

  const relevant = scored.filter(s => s.score >= 6);
  if (relevant.length === 0) return null;

  relevant.sort((a, b) => b.score - a.score);

  // 取最高分的句子作为总结
  const best = relevant[0];
  let display = esc(best.text);

  // 高亮所有匹配到的术语（按长度降序，避免短词覆盖长词的高亮）
  const uniqueTerms = [...new Set(best.matchedTerms)].sort((a, b) => b.length - a.length);
  for (const kw of uniqueTerms) {
    const regex = new RegExp(`(${escRegex(kw)})`, 'gi');
    display = display.replace(regex, '<strong class="kw-highlight">$1</strong>');
  }

  return `<span class="summary-icon">💡</span> ${display}`;
}
