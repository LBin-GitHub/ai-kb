<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abin's AI 知识库</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='56' font-size='56'>🧠</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #fafaf8;
      --bg-card: #ffffff;
      --bg-sidebar: #f5f4f0;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --text-dim: #999;
      --border: #e8e6e0;
      --accent: #4f46e5;
      --accent-light: #eef2ff;
      --accent-hover: #4338ca;
      --node-fill: #818cf8;
      --node-stroke: #4f46e5;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 24px rgba(0,0,0,0.08);
      --radius: 10px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', Consolas, monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 280px;
      min-width: 280px;
      height: 100vh;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .sidebar-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-header h1 .icon { font-size: 24px; }
    .sidebar-header .subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }
    .sidebar-nav .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      padding: 8px 20px;
      font-weight: 600;
    }
    .tree-item {
      display: flex;
      align-items: center;
      padding: 5px 20px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
      transition: all 0.15s;
      gap: 6px;
      border-left: 2px solid transparent;
      user-select: none;
    }
    .tree-item:hover {
      background: var(--accent-light);
      color: var(--text);
    }
    .tree-item.active {
      color: var(--accent);
      background: var(--accent-light);
      border-left-color: var(--accent);
      font-weight: 500;
    }
    .tree-item .arrow {
      width: 16px;
      font-size: 10px;
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .tree-item .arrow.expanded { transform: rotate(90deg); }
    .tree-item .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      opacity: 0.5;
    }
    .sidebar-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
    }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .topbar {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .search-wrapper {
      flex: 1;
      max-width: 520px;
      position: relative;
      display: flex;
      align-items: center;
      gap: 0;
    }
    .search-mode-tabs {
      display: flex;
      flex-shrink: 0;
      margin-right: 8px;
    }
    .search-mode-tab {
      padding: 4px 12px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all 0.15s;
    }
    .search-mode-tab:first-child { border-radius: 6px 0 0 6px; }
    .search-mode-tab:last-child { border-radius: 0 6px 6px 0; }
    .search-mode-tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .search-mode-tab:hover:not(.active) {
      background: var(--accent-light);
    }
    .search-input-group {
      flex: 1;
      position: relative;
      display: flex;
    }
    .search-input-group input {
      width: 100%;
      padding: 8px 36px 8px 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--bg-card);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      font-family: var(--font-sans);
    }
    .search-input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }
    .search-input-group .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--text-dim);
    }
    .search-input-group .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: none;
      background: var(--border);
      color: var(--text-dim);
      font-size: 14px;
      line-height: 22px;
      text-align: center;
      cursor: pointer;
      display: none;
      font-family: var(--font-sans);
      padding: 0;
      transition: background 0.15s, color 0.15s;
    }
    .search-wrapper .search-clear:hover {
      background: var(--accent);
      color: #fff;
    }
    .search-wrapper .search-clear.visible {
      display: block;
    }
    .search-results {
      display: none;
      position: absolute;
      top: 42px;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      max-height: 360px;
      overflow-y: auto;
      z-index: 200;
    }
    .search-results.show { display: block; }
    .search-result-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      transition: background 0.1s;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--accent-light); }
    .search-result-item .result-title {
      font-weight: 500;
      color: var(--text);
    }
    .search-result-item .result-snippet {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .search-result-item .result-snippet em {
      background: #fef08a;
      font-style: normal;
      padding: 0 2px;
      border-radius: 2px;
    }
    .no-results {
      padding: 24px 14px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }

    .last-sync {
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* ===== CONTENT AREA ===== */
    .content {
      flex: 1;
      overflow-y: auto;
      display: flex;
    }

    /* Homepage */
    .homepage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
    }
    .homepage .graph-container {
      width: 100%;
      max-width: 700px;
      height: 500px;
      position: relative;
      background: radial-gradient(ellipse at center, #f0edff 0%, #fafaf8 70%);
      border-radius: 16px;
      border: 1px solid #e0dbf0;
    }
    .homepage .graph-container svg { width: 100%; height: 100%; }
    .homepage .graph-reset-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 5;
      padding: 5px 14px;
      font-size: 12px;
      border: 1px solid var(--accent);
      background: var(--bg-card);
      color: var(--accent);
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-sans);
      font-weight: 500;
      transition: all 0.2s;
      display: none;
    }
    .homepage .graph-reset-btn.visible { display: block; }
    .homepage .graph-reset-btn:hover {
      background: var(--accent);
      color: #fff;
    }
    .homepage .graph-hint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: var(--text-dim);
      background: var(--bg);
      padding: 4px 12px;
      border-radius: 20px;
    }
    .homepage .stats {
      display: flex;
      gap: 32px;
      margin-top: 24px;
    }
    .homepage .stat {
      text-align: center;
    }
    .homepage .stat .num {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
    }
    .homepage .stat .label {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Document page */
    .doc-page {
      flex: 1;
      display: flex;
      align-items: flex-start;
      overflow-y: auto;
      min-height: 0;
    }
    .doc-content {
      flex: 1;
      max-width: 760px;
      margin-left: 200px;
      padding: 24px 48px 40px;
      transition: margin-left 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .doc-page.toc-collapsed .doc-content { margin-left: 36px; }
    .doc-page.toc-collapsed .doc-toc {
      width: 36px;
      overflow: hidden;
    }
    .doc-page.toc-collapsed .doc-toc-inner {
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
    }
    .doc-page.toc-collapsed .doc-toc-header {
      opacity: 0;
      transition: opacity 0.12s ease;
      pointer-events: none;
    }
    .doc-page.toc-collapsed .doc-toc-toggle {
      left: 316px;
    }
    .doc-content h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-top: 0;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .doc-content h2 {
      font-size: 22px;
      font-weight: 600;
      margin-top: 36px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .doc-content h3 {
      font-size: 17px;
      font-weight: 600;
      margin-top: 24px;
      margin-bottom: 8px;
    }
    .doc-content p {
      font-size: 15px;
      line-height: 1.75;
      margin-bottom: 14px;
      color: #333;
    }
    .doc-content strong { font-weight: 600; }
    .doc-content em { font-style: italic; }
    .doc-content blockquote {
      border-left: 3px solid var(--accent);
      margin: 16px 0;
      padding: 12px 16px;
      background: var(--accent-light);
      border-radius: 0 6px 6px 0;
      font-size: 14px;
      color: #444;
    }
    .doc-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }
    .doc-content a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent-light);
      transition: border-color 0.15s;
    }
    .doc-content a:hover { border-bottom-color: var(--accent); }
    .doc-content mark.rag-highlight {
      background: #fef08a;
      color: #1a1a1a;
      padding: 1px 3px;
      border-radius: 3px;
      box-shadow: 0 0 0 2px #fef08a;
      transition: background 0.3s;
    }
    .doc-content mark.rag-highlight.active-highlight {
      background: #fbbf24;
      box-shadow: 0 0 0 3px #fbbf24;
    }
    .doc-content .ai-link {
      color: var(--accent);
      cursor: pointer;
      border-bottom: 1px dashed var(--accent);
      text-decoration: none;
    }
    .doc-content .ai-link:hover {
      background: var(--accent-light);
    }
    /* Code blocks & inline code */
    .doc-content code {
      font-family: var(--font-mono);
      font-size: 13px;
      background: #f1f0ec;
      padding: 2px 6px;
      border-radius: 4px;
      color: #d63384;
    }
    .doc-content .code-block-wrapper {
      position: relative;
      margin: 16px 0;
    }
    .doc-content .code-block-wrapper pre {
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 36px 20px 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0;
      line-height: 1.6;
      font-size: 13px;
    }
    .doc-content .code-block-wrapper pre code {
      background: none;
      color: inherit;
      padding: 0;
      border-radius: 0;
      font-size: inherit;
      user-select: all;
    }
    .doc-content .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.55);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-sans);
      transition: all 0.15s;
      z-index: 1;
    }
    .doc-content .copy-btn:hover {
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.85);
      border-color: rgba(255,255,255,0.3);
    }
    .doc-content .copy-btn.copied {
      color: #4ade80;
      border-color: #4ade80;
      background: rgba(74,222,128,0.12);
    }
    /* Tables */
    .doc-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
      font-size: 14px;
    }
    .doc-content th, .doc-content td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .doc-content th {
      background: var(--bg-sidebar);
      font-weight: 600;
    }
    /* Ordered lists & nested lists */
    .doc-content ol, .doc-content ul {
      margin: 10px 0 14px 24px;
      line-height: 1.75;
      color: #333;
    }
    .doc-content li { margin-bottom: 4px; font-size: 15px; }
    .doc-content li p { margin-bottom: 4px; }
    .doc-content img {
      max-width: 100%;
      border-radius: 6px;
      margin: 12px 0;
    }
    .doc-meta {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 24px;
    }
    .doc-meta .tag {
      background: var(--accent-light);
      color: var(--accent);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    /* Backlinks panel */
    .backlinks-panel {
      width: 240px;
      min-width: 240px;
      border-left: 1px solid var(--border);
      padding: 40px 20px;
      overflow-y: auto;
      background: var(--bg-sidebar);
    }
    .backlinks-panel h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }
    .backlinks-panel .bl-item {
      display: block;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 6px;
      margin-bottom: 2px;
      transition: all 0.15s;
    }
    .backlinks-panel .bl-item:hover {
      background: var(--accent-light);
      color: var(--accent);
    }
    .backlinks-panel .bl-empty {
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      padding: 20px 0;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      padding: 40px;
      text-align: center;
    }
    /* ===== RAG Chat Widget ===== */
    .rag-fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      padding: 10px 20px;
      border-radius: 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font-sans);
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(79,70,229,0.35);
      z-index: 500;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }
    .rag-fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(79,70,229,0.45); }
    .rag-panel {
      position: fixed;
      bottom: 92px;
      right: 28px;
      width: 380px;
      max-height: 520px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow-lg);
      z-index: 500;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .rag-panel.open { display: flex; }
    .rag-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--accent-light);
    }
    .rag-header strong { font-size: 14px; color: var(--accent); }
    .rag-header button {
      background: none; border: none; cursor: pointer;
      font-size: 16px; color: var(--text-dim); padding: 2px 6px;
    }
    .rag-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      min-height: 80px;
      max-height: 340px;
    }
    .rag-msg {
      margin-bottom: 12px;
      animation: fadeIn 0.25s;
    }
    .rag-msg.user { text-align: right; }
    .rag-msg.user span {
      background: var(--accent);
      color: #fff;
      padding: 8px 14px;
      border-radius: 14px 14px 4px 14px;
      display: inline-block;
      max-width: 85%;
      font-size: 14px;
      line-height: 1.5;
    }
    .rag-msg.assistant {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text);
    }
    .rag-msg.assistant .source {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-dim);
      padding: 4px 8px;
      background: var(--bg-sidebar);
      border-radius: 6px;
      margin-bottom: 2px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .rag-msg.assistant .source:hover { background: var(--accent-light); }
    .rag-msg.assistant .no-match {
      color: var(--text-dim);
      font-style: italic;
    }
    .rag-msg.assistant .rag-answer {
      background: var(--bg);
      padding: 10px 14px;
      border-radius: 10px;
      border-left: 3px solid var(--accent);
      line-height: 1.75;
      margin-bottom: 8px;
    }
    .rag-msg.assistant .rag-answer-intro {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 10px;
      line-height: 1.6;
    }
    .rag-thinking {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 13px;
      animation: rag-pulse 1.5s ease-in-out infinite;
    }
    @keyframes rag-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    .rag-msg.assistant .rag-answer-section {
      background: var(--accent-light);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .rag-msg.assistant .rag-answer-heading {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .rag-msg.assistant .rag-answer-body {
      font-size: 13px;
      line-height: 1.75;
      color: var(--text);
    }
    .rag-msg.assistant .rag-answer-summary {
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 14px;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
    }
    .rag-msg.assistant .rag-answer-summary .summary-icon {
      margin-right: 4px;
    }
    .rag-msg.assistant .rag-answer-detail-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .rag-msg.assistant .kw-highlight {
      background: #fef08a;
      color: #1a1a1a;
      font-weight: 600;
      padding: 1px 3px;
      border-radius: 3px;
    }
    .rag-input-area {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .rag-input-area input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      outline: none;
      font-family: var(--font-sans);
      background: var(--bg);
    }
    .rag-input-area input:focus { border-color: var(--accent); }
    .rag-input-area button {
      padding: 8px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font-sans);
      font-weight: 500;

    /* ===== TOC in doc page ===== */

<body>

<script>
// ============================================================
// DATA LOADING
// ============================================================
let data = null;
let currentDocId = null;
let tocCollapsed = localStorage.getItem('tocCollapsed') === 'true';
let searchMode = 'graph'; // 'graph' or 'doc'
let graphFilter = null; // { visibleIds: Set, highlightedIds: Set } or null
const HIDDEN_DOC_IDS = new Set(['M2a6d47IcocGT5x5GyEc1EA3nzc']); // Add doc IDs to hide from sidebar/search/graph
const DEEPSEEK_API_KEY = 'sk-09caa3f74c0d40' + '89977853b1a9165814';

function setSearchMode(mode) {
  searchMode = mode;
  document.getElementById('searchModeGraph').classList.toggle('active', mode === 'graph');
  document.getElementById('searchModeDoc').classList.toggle('active', mode === 'doc');
  const input = document.getElementById('searchInput');
  if (mode === 'graph') {
    input.placeholder = '搜索图谱节点...';
  } else {
    input.placeholder = '搜索文档标题或内容...';
  }
  // Clear results on mode switch
  hideSearch();
  input.value = '';
  // Switch view accordingly
  if (mode === 'graph') {
    if (graphFilter) { graphFilter = null; }
    showHome();
  } else {
    graphFilter = null;
    if (currentDocId) {
      renderDocPage(currentDocId);
    } else {
      showDoc();
    }
  }
}

async function loadData() {
  try {
    const resp = await fetch('data/kb-data.json');
    data = await resp.json();
    // Mark folder docs (only a title, no real content)
    for (const doc of data.documents) {
      doc.isFolder = isFolderDoc(doc);
    }
    initUI();
  } catch (e) {
    document.getElementById('contentArea').innerHTML =
      '<div class="empty-state"><div class="emoji">📡</div><h2>数据加载失败</h2><p>请先运行 sync.js 同步飞书内容</p></div>';
  }
}

function isFolderDoc(doc) {
  if (doc.hasChild) return true; // sync.js marks folders
  if (!doc.content) return true;
  const body = doc.content.replace(/^#+\s+.*$/gm, '').trim();
  return body.length === 0;
}

// ============================================================
// UI INITIALIZATION
// ============================================================
function initUI() {
  buildDocTree();
  buildRagIndex();
  showHome();
  updateStats();
  document.getElementById('lastSync').textContent =
    '已同步 ' + new Date(data.generated).toLocaleString('zh-CN');
  document.getElementById('docCount').textContent = data.documents.length + ' 篇';
  document.getElementById('syncStatus').textContent = '已同步';
}

function updateStats() {
  // Stats displayed in homepage stat cards
}

function buildDocTree() {
  const container = document.getElementById('docTree');
  if (!data.tree || data.tree.length === 0) {
    container.innerHTML = '<div style="padding:12px 20px;color:var(--text-dim);font-size:13px;">暂无文档</div>';
    return;
  }
  container.innerHTML = '';
  // Count real docs (non-folder, with content, not hidden)
  const realDocCount = data.documents.filter(d => d.content && !d.isFolder && !HIDDEN_DOC_IDS.has(d.id)).length;
  const expandAll = realDocCount < 15;
  data.tree.forEach(root => renderTreeNode(root, container, 0, expandAll));
}

function renderTreeNode(node, parent, depth, expandAll) {
  // Filter hidden docs
  if (HIDDEN_DOC_IDS.has(node.id)) {
    // Still render children (in case children aren't hidden)
    if (node.children) node.children.forEach(child => renderTreeNode(child, parent, depth, expandAll));
    return;
  }

  const div = document.createElement('div');
  div.className = 'tree-item';
  div.style.paddingLeft = (20 + depth * 16) + 'px';

  const doc = data.documents.find(d => d.id === node.id);
  const isFolder = node.children && node.children.length > 0 && (!doc || doc.isFolder);
  const hasKids = node.children && node.children.length > 0;
  const expanded = expandAll && hasKids;

  div.onclick = () => {
    if (isFolder) {
      // Folder: just expand/collapse, don't open doc
      const arrow = div.querySelector('.arrow');
      arrow?.classList.toggle('expanded');
      toggleChildren(div);
    } else if (node.children && node.children.length > 0) {
      // Doc with children: expand AND open
      const arrow = div.querySelector('.arrow');
      arrow?.classList.toggle('expanded');
      toggleChildren(div);
      openDoc(node.id);
    } else {
      // Leaf doc
      openDoc(node.id);
    }
  };

  if (isFolder) {
    div.innerHTML = `<span class="arrow${expanded ? ' expanded' : ''}">▶</span> 📁 ${esc(node.title)}`;
  } else if (node.children && node.children.length > 0) {
    div.innerHTML = `<span class="arrow${expanded ? ' expanded' : ''}">▶</span> ${esc(node.title)}`;
  } else {
    div.innerHTML = `<span class="dot"></span> ${esc(node.title)}`;
  }

  parent.appendChild(div);

  // Children wrapper
  const childrenWrap = document.createElement('div');
  childrenWrap.style.display = expanded ? 'block' : 'none';
  parent.appendChild(childrenWrap);

  if (node.children) {
    node.children.forEach(child => renderTreeNode(child, childrenWrap, depth + 1, expandAll));
  }
}

function toggleChildren(item) {
  const next = item.nextElementSibling;
  if (next) {
    next.style.display = next.style.display === 'none' ? 'block' : 'none';
  }
}

// ============================================================
// VIEWS
// ============================================================
function showHome() {
  currentDocId = null;
  graphFilter = null;
  document.getElementById('searchInput').value = '';
  hideSearch();
  document.getElementById('searchModeGraph').classList.add('active');
  document.getElementById('searchModeDoc').classList.remove('active');
  searchMode = 'graph';
  document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));

  if (!data || data.graph.nodes.length === 0) {
    document.getElementById('contentArea').innerHTML =
      '<div class="empty-state"><div class="emoji">🌌</div><h2>知识图谱为空</h2><p>请在飞书中添加内容后重新同步</p></div>';
    return;
  }
  renderHomepage();
}

function showDoc(docId) {
  if (!docId && !currentDocId) {
    // No doc open — open the first non-folder document
    const firstDoc = data?.documents?.find(d => !d.isFolder);
    if (firstDoc) currentDocId = firstDoc.id;
    else return;
  }
  if (docId) currentDocId = docId;
  document.getElementById('searchModeGraph').classList.remove('active');
  document.getElementById('searchModeDoc').classList.add('active');
  searchMode = 'doc';
  renderDocPage(currentDocId);
}

// TOC collapse/expand — global, persisted across all docs
function toggleToc() {
  tocCollapsed = !tocCollapsed;
  localStorage.setItem('tocCollapsed', tocCollapsed.toString());
  const page = document.querySelector('.doc-page');
  if (page) {
    page.classList.toggle('toc-collapsed', tocCollapsed);
  }
  const btn = document.querySelector('.doc-toc-toggle');
  if (btn) {
    btn.setAttribute('data-tip', tocCollapsed ? '展开目录' : '收起目录');
    btn.innerHTML = tocCollapsed ? '☰' : '≪';
  }
}

function openDoc(docId) {
  const doc = data.documents.find(d => d.id === docId);
  if (!doc || doc.isFolder) return; // Don't open folders

  document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
  document.getElementById('searchModeGraph').classList.remove('active');
  document.getElementById('searchModeDoc').classList.add('active');
  searchMode = 'doc';
  currentDocId = docId;
  renderDocPage(docId);
}

// Show graph centered on a specific doc + its connected neighbors
function showGraphForDoc(docId) {
  currentDocId = null;
  document.getElementById('searchModeGraph').classList.add('active');
  document.getElementById('searchModeDoc').classList.remove('active');
  searchMode = 'graph';
  document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));

  // Build connectivity map
  const connected = new Map(); // nodeId -> Set of connected nodeIds
  for (const e of data.graph.edges) {
    if (!connected.has(e.source)) connected.set(e.source, new Set());
    if (!connected.has(e.target)) connected.set(e.target, new Set());
    connected.get(e.source).add(e.target);
    connected.get(e.target).add(e.source);
  }
  // Also add tree edges
  function walkTreeConn(nodes, parentId) {
    for (const node of nodes) {
      if (parentId) {
        if (!connected.has(parentId)) connected.set(parentId, new Set());
        if (!connected.has(node.id)) connected.set(node.id, new Set());
        connected.get(parentId).add(node.id);
        connected.get(node.id).add(parentId);
      }
      if (node.children) walkTreeConn(node.children, node.id);
    }
  }
  walkTreeConn(data.tree, null);

  // Compute visible set: target + 1-hop neighbors
  const visibleIds = new Set([docId]);
  const highlightedIds = new Set([docId]);
  const neighbors = connected.get(docId);
  if (neighbors) {
    for (const nid of neighbors) {
      visibleIds.add(nid);
    }
  }

  graphFilter = { visibleIds, highlightedIds };
  if (!data || data.graph.nodes.length === 0) {
    document.getElementById('contentArea').innerHTML =
      '<div class="empty-state"><div class="emoji">🌌</div><h2>知识图谱为空</h2></div>';
    return;
  }
  renderHomepage();
}

// ============================================================
// HOMEPAGE - Knowledge Graph
// ============================================================
function renderHomepage() {
  const area = document.getElementById('contentArea');
  const visibleCount = graphFilter ? graphFilter.visibleIds.size : data.graph.nodes.filter(n => !HIDDEN_DOC_IDS.has(n.id)).length;
  const highlightedCount = graphFilter ? graphFilter.highlightedIds.size : 0;
  const filterHint = graphFilter
    ? `<div class="graph-hint" style="color:var(--accent);font-weight:600;">🔍 筛选模式：显示 ${visibleCount} 个节点（${highlightedCount} 个匹配）</div>`
    : '<div class="graph-hint">🖱️ 拖拽节点 · 滚轮缩放 · 实线=层级关系 · 虚线=内容关联 · 点击打开文档</div>';

  area.innerHTML = `
    <div class="homepage">
      <div class="graph-container" id="graphContainer">
        <button class="graph-reset-btn${graphFilter ? ' visible' : ''}" onclick="resetSearch()">↺ 重置</button>
      </div>
      ${filterHint}
      <div class="stats">
        <div class="stat"><div class="num">${data.documents.filter(d => !HIDDEN_DOC_IDS.has(d.id)).length}</div><div class="label">文档</div></div>
        <div class="stat"><div class="num">${data.graph.edges.length}</div><div class="label">链接</div></div>
        <div class="stat"><div class="num">${data.tree.length}</div><div class="label">分类</div></div>
      </div>
    </div>
  `;

  // Wait for DOM
  setTimeout(() => drawGraph(), 50);
}

function drawGraph() {
  const container = document.getElementById('graphContainer');
  if (!container) return;

  const W = container.clientWidth;
  const H = container.clientHeight;
  const pad = 70;

  // Build tree-based hierarchy
  const depthMap = {}; // nodeId -> { depth, parentId, color }
  const childrenMap = {}; // nodeId -> [childIds]

  function walkTree(nodes, parentId, depth, colorIdx) {
    for (let i = 0; i < nodes.length; i++) {
      const node = nodes[i];
      const branchColor = depth === 0 ? COLORS[i % COLORS.length] : colorIdx;
      depthMap[node.id] = {
        depth,
        parentId: parentId || null,
        color: branchColor,
      };
      childrenMap[node.id] = (node.children || []).map(c => c.id);
      if (node.children && node.children.length > 0) {
        walkTree(node.children, node.id, depth + 1, branchColor);
      }
    }
  }

  const COLORS = ['#4f46e5', '#7c3aed', '#2563eb', '#059669', '#d97706', '#dc2626', '#0891b2', '#be185d'];
  walkTree(data.tree, null, 0, 0);

  // Collect all unique node IDs from tree + graph
  const allIds = new Set();
  for (const n of data.graph.nodes) allIds.add(n.id);
  for (const id of Object.keys(depthMap)) allIds.add(id);

  // ============================================
  // NEW LAYOUT: Parent-centered tree spreading
  // ============================================
  const positions = {};
  const subtreeSize = {};

  function getSubtreeSize(id) {
    if (subtreeSize[id] !== undefined) return subtreeSize[id];
    const kids = childrenMap[id] || [];
    if (kids.length === 0) return subtreeSize[id] = 1;
    return subtreeSize[id] = 1 + kids.reduce((sum, c) => sum + getSubtreeSize(c), 0);
  }

  // Place roots with spacing proportional to subtree size
  const rootIds = data.tree.map(n => n.id);
  const totalSubtreeSize = rootIds.reduce((sum, id) => sum + getSubtreeSize(id), 0);
  const usableWidth = Math.max(W - pad * 2, 200);
  let xCursor = pad + 20;

  for (let i = 0; i < rootIds.length; i++) {
    const id = rootIds[i];
    const size = getSubtreeSize(id);
    const branchWidth = (size / totalSubtreeSize) * usableWidth;
    const x = xCursor + branchWidth / 2;
    const jitterY = (Math.random() - 0.5) * 20;
    positions[id] = { x: x, y: pad + 30 + jitterY, depth: 0 };
    placeChildren(id, x, branchWidth, positions[id].y, 1);
    xCursor += branchWidth;
  }

  // Recursive child placement: children spread in a fan below their parent
  function placeChildren(parentId, parentX, parentWidth, parentY, depth) {
    const children = childrenMap[parentId] || [];
    if (children.length === 0) return;
    const childY = parentY + 130;
    const minSpacing = 90;
    const spacing = Math.max(minSpacing, parentWidth / (children.length + 1));
    const totalWidth = spacing * (children.length - 1);
    let startX = parentX - totalWidth / 2;
    for (let i = 0; i < children.length; i++) {
      const childId = children[i];
      const jitterX = (Math.random() - 0.5) * 15;
      const jitterY = (Math.random() - 0.5) * 10;
      positions[childId] = {
        x: startX + spacing * i + jitterX,
        y: Math.max(pad + 50, Math.min(H - pad - 50, childY + jitterY)),
        depth: depth,
      };
      const childWidth = parentWidth / children.length;
      placeChildren(childId, positions[childId].x, childWidth, positions[childId].y, depth + 1);
    }
  }

  // Orphan nodes (in graph but not in tree)
  for (const id of allIds) {
    if (!positions[id]) {
      positions[id] = {
        x: W / 2 + (Math.random() - 0.5) * 150,
        y: H / 2 + (Math.random() - 0.5) * 150,
        depth: 0,
      };
    }
  }

  // Build edge list: tree edges + graph edges
  const edgeList = [];

  // Tree edges (parent -> child)
  for (const [parentId, childIds] of Object.entries(childrenMap)) {
    for (const childId of childIds) {
      edgeList.push({ source: parentId, target: childId, type: 'tree' });
    }
  }

  // Cross-reference edges from graph
  for (const e of data.graph.edges) {
    edgeList.push({ source: e.source, target: e.target, type: 'cross' });
  }

  // Apply graph filter if active
  const visibleIds = graphFilter ? graphFilter.visibleIds : null;
  const highlightedIds = graphFilter ? graphFilter.highlightedIds : null;

  // Node visuals
  const nodeSize = (depth) => 28 - depth * 5;

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  container.appendChild(svg);

  const linkGroup = document.createElementNS(svgNS, 'g');
  svg.appendChild(linkGroup);
  const nodeGroup = document.createElementNS(svgNS, 'g');
  svg.appendChild(nodeGroup);

  // Draw links
  for (const edge of edgeList) {
    const sp = positions[edge.source];
    const tp = positions[edge.target];
    if (!sp || !tp) continue;
    if (HIDDEN_DOC_IDS.has(edge.source) || HIDDEN_DOC_IDS.has(edge.target)) continue;

    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', sp.x);
    line.setAttribute('y1', sp.y);
    line.setAttribute('x2', tp.x);
    line.setAttribute('y2', tp.y);

    const linkVisible = !visibleIds || (visibleIds.has(edge.source) && visibleIds.has(edge.target));

    if (edge.type === 'tree') {
      line.setAttribute('stroke', '#8884d8');
      line.setAttribute('stroke-width', linkVisible ? '2.5' : '0.5');
      line.setAttribute('stroke-opacity', linkVisible ? '0.55' : '0.06');
    } else {
      line.setAttribute('stroke', '#f59e0b');
      line.setAttribute('stroke-width', linkVisible ? '1.5' : '0.5');
      line.setAttribute('stroke-opacity', linkVisible ? '0.35' : '0.06');
      line.setAttribute('stroke-dasharray', '6 4');
    }
    linkGroup.appendChild(line);
  }

  // Draw nodes
  const nodeEls = [];
  for (const [id, pos] of Object.entries(positions)) {
    if (HIDDEN_DOC_IDS.has(id)) continue;
    const g = document.createElementNS(svgNS, 'g');
    g.setAttribute('transform', `translate(${pos.x},${pos.y})`);

    const isVisible = !visibleIds || visibleIds.has(id);
    const isHighlighted = highlightedIds && highlightedIds.has(id);

    let cls = 'graph-node';
    if (!isVisible) cls += ' hidden';
    if (isHighlighted) cls += ' highlighted';
    g.className.baseVal = cls;

    const doc = data.documents.find(d => d.id === id);
    const isFolder = doc && doc.isFolder;
    const dm = depthMap[id] || { depth: 0, color: '#999' };

    // Custom tooltip: mouseenter/mousemove/mouseleave on group
    const fullTitle = doc ? doc.title : id;

    const r = isFolder ? 18 - pos.depth * 3 : nodeSize(pos.depth);

    if (!isFolder && isVisible) {
      g.setAttribute('cursor', 'pointer');
      g.onclick = () => openDoc(id);
    } else {
      g.setAttribute('cursor', 'default');
    }

    // Outer ring (depth indicator)
    if (isFolder) {
      // Hexagon outer ring for folder nodes
      const outerR = r + 5;
      const sqrt32 = 0.866;
      const outerPoints = [
        [outerR, 0], [outerR / 2, outerR * sqrt32], [-outerR / 2, outerR * sqrt32],
        [-outerR, 0], [-outerR / 2, -outerR * sqrt32], [outerR / 2, -outerR * sqrt32]
      ].map(p => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
      const outerHex = document.createElementNS(svgNS, 'polygon');
      outerHex.setAttribute('points', outerPoints);
      outerHex.setAttribute('fill', 'none');
      outerHex.setAttribute('stroke', dm.color);
      outerHex.setAttribute('stroke-width', '1.5');
      outerHex.setAttribute('stroke-opacity', '0.35');
      outerHex.setAttribute('stroke-dasharray', '4 4');
      g.appendChild(outerHex);
    } else {
      const outerRing = document.createElementNS(svgNS, 'circle');
      outerRing.setAttribute('r', r + 3);
      outerRing.setAttribute('fill', 'none');
      outerRing.setAttribute('stroke', dm.color);
      outerRing.setAttribute('stroke-width', '1.5');
      outerRing.setAttribute('stroke-opacity', pos.depth === 0 ? '0.5' : '0.25');
      g.appendChild(outerRing);
    }

    // Main circle or folder hexagon
    if (isFolder) {
      // Hexagon shape — visually distinct "container" for grouping
      const hexR = r + 2;
      const sqrt32 = 0.866; // √3/2
      const hexPoints = [
        [hexR, 0],
        [hexR / 2, hexR * sqrt32],
        [-hexR / 2, hexR * sqrt32],
        [-hexR, 0],
        [-hexR / 2, -hexR * sqrt32],
        [hexR / 2, -hexR * sqrt32]
      ].map(p => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');

      const hex = document.createElementNS(svgNS, 'polygon');
      hex.setAttribute('points', hexPoints);
      hex.setAttribute('fill', '#e8e8f0');
      hex.setAttribute('stroke', '#b0b0c8');
      hex.setAttribute('stroke-width', pos.depth === 0 ? '2.5' : '1.5');
      hex.setAttribute('stroke-dasharray', '5 3');
      hex.setAttribute('opacity', '0.75');
      g.appendChild(hex);

      // Inner smaller hexagon for depth
      const innerR = hexR * 0.55;
      const innerPoints = [
        [innerR, 0],
        [innerR / 2, innerR * sqrt32],
        [-innerR / 2, innerR * sqrt32],
        [-innerR, 0],
        [-innerR / 2, -innerR * sqrt32],
        [innerR / 2, -innerR * sqrt32]
      ].map(p => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');

      const innerHex = document.createElementNS(svgNS, 'polygon');
      innerHex.setAttribute('points', innerPoints);
      innerHex.setAttribute('fill', '#d4d4e0');
      innerHex.setAttribute('stroke', '#a0a0b8');
      innerHex.setAttribute('stroke-width', '1');
      innerHex.setAttribute('opacity', '0.7');
      g.appendChild(innerHex);

      // Child count badge
      const childCount = (childrenMap[id] || []).length;
      if (childCount > 0) {
        const countText = document.createElementNS(svgNS, 'text');
        countText.setAttribute('text-anchor', 'middle');
        countText.setAttribute('dy', '0.35em');
        countText.setAttribute('font-size', String(Math.max(9, r * 0.65)));
        countText.setAttribute('font-weight', '700');
        countText.setAttribute('fill', '#6b6b8a');
        countText.setAttribute('font-family', '-apple-system, sans-serif');
        countText.setAttribute('pointer-events', 'none');
        countText.textContent = String(childCount);
        g.appendChild(countText);
      }
    } else {
      const circle = document.createElementNS(svgNS, 'circle');
      circle.setAttribute('r', r);
      circle.setAttribute('fill', dm.color);
      circle.setAttribute('stroke', dm.color);
      circle.setAttribute('stroke-width', pos.depth === 0 ? '3' : '2');
      circle.setAttribute('opacity', pos.depth === 0 ? '0.95' : '0.8');
      g.appendChild(circle);
    }

    // Label
    const label = document.createElementNS(svgNS, 'text');
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('dy', r + (pos.depth === 0 ? 16 : 13));
    label.setAttribute('font-size', pos.depth === 0 ? '12' : '10');
    label.setAttribute('fill', pos.depth === 0 ? '#1a1a1a' : '#4a4a4a');
    label.setAttribute('font-weight', pos.depth === 0 ? '700' : '400');
    label.setAttribute('font-family', '-apple-system, sans-serif');
    const docTitle = doc ? doc.title : id;
    const maxLen = pos.depth === 0 ? 12 : 10;
    const truncated = docTitle.length > maxLen ? docTitle.substring(0, maxLen - 1) + '…' : docTitle;
    label.textContent = truncated;
    g.appendChild(label);

    nodeGroup.appendChild(g);
    nodeEls.push({ g, id, pos, r, fullTitle, isFolder });
  }

  // Drag + zoom
  let dragNode = null, dragOffX = 0, dragOffY = 0;
  let scale = 1, panX = 0, panY = 0;
  let dragGroupOffsets = new Map(); // descendantId -> {ox, oy}

  function applyTransform() {
    nodeGroup.setAttribute('transform', `translate(${panX},${panY}) scale(${scale})`);
    linkGroup.setAttribute('transform', `translate(${panX},${panY}) scale(${scale})`);
  }

  svg.addEventListener('mousedown', (e) => {
    const mx = (e.offsetX - panX) / scale;
    const my = (e.offsetY - panY) / scale;
    for (const el of nodeEls) {
      const dx = mx - el.pos.x, dy = my - el.pos.y;
      if (Math.sqrt(dx * dx + dy * dy) < el.r + 10) {
        dragNode = el;
        dragOffX = dx;
        dragOffY = dy;

        // Build drag group: all descendants move together
        dragGroupOffsets = new Map();
        function collectDescendants(id) {
          const kids = childrenMap[id] || [];
          for (const childId of kids) {
            dragGroupOffsets.set(childId, {
              ox: positions[childId].x - positions[dragNode.id].x,
              oy: positions[childId].y - positions[dragNode.id].y,
            });
            collectDescendants(childId);
          }
        }
        collectDescendants(el.id);
        break;
      }
    }
  });

  svg.addEventListener('mousemove', (e) => {
    const mx = (e.offsetX - panX) / scale;
    const my = (e.offsetY - panY) / scale;

    if (dragNode) {
      const newX = mx - dragOffX;
      const newY = my - dragOffY;
      const deltaX = newX - dragNode.pos.x;
      const deltaY = newY - dragNode.pos.y;
      dragNode.pos.x = newX;
      dragNode.pos.y = newY;
      dragNode.g.setAttribute('transform', `translate(${newX},${newY})`);

      // Move all descendants together with the parent
      for (const [descId, offsets] of dragGroupOffsets) {
        const descPos = positions[descId];
        if (descPos) {
          descPos.x += deltaX;
          descPos.y += deltaY;
          const descEl = nodeEls.find(el => el.id === descId);
          if (descEl && descEl.g) {
            descEl.g.setAttribute('transform', `translate(${descPos.x},${descPos.y})`);
          }
        }
      }

      // Update all edges touching any node in the drag group
      const groupIds = new Set([dragNode.id, ...dragGroupOffsets.keys()]);
      const lines = linkGroup.querySelectorAll('line');
      let li = 0;
      for (const edge of edgeList) {
        if (groupIds.has(edge.source) || groupIds.has(edge.target)) {
          const sp = positions[edge.source];
          const tp = positions[edge.target];
          if (sp && tp && lines[li]) {
            lines[li].setAttribute('x1', sp.x); lines[li].setAttribute('y1', sp.y);
            lines[li].setAttribute('x2', tp.x); lines[li].setAttribute('y2', tp.y);
          }
        }
        li++;
      }
    }

    // Instant custom tooltip — no delay
    const tip = document.getElementById('graphTooltip');
    let hovered = null;
    for (const el of nodeEls) {
      const dx = mx - el.pos.x, dy = my - el.pos.y;
      const hitR = el.r + 24; // generous hit area covers both icon and text
      if (Math.sqrt(dx * dx + dy * dy) < hitR) {
        hovered = el;
        break;
      }
    }
    if (hovered) {
      tip.textContent = hovered.fullTitle;
      tip.style.display = 'block';
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top = (e.clientY - 32) + 'px';
    } else {
      tip.style.display = 'none';
    }

    svg.style.cursor = dragNode ? 'grabbing' : (hovered && !hovered.isFolder ? 'pointer' : '');
  });

  svg.addEventListener('mouseup', () => { dragNode = null; dragGroupOffsets = new Map(); });

  svg.addEventListener('mouseleave', () => {
    document.getElementById('graphTooltip').style.display = 'none';
  });

  svg.addEventListener('wheel', (e) => {
    e.preventDefault();
    const zoom = e.deltaY < 0 ? 1.1 : 0.9;
    scale *= zoom;
    scale = Math.max(0.25, Math.min(4, scale));
    applyTransform();
  }, { passive: false });
}

// DOCUMENT PAGE
// ============================================================
function renderDocPage(docId) {
  const doc = data.documents.find(d => d.id === docId);
  if (!doc) {
    document.getElementById('contentArea').innerHTML =
      '<div class="empty-state"><div class="emoji">📄</div><h2>文档未找到</h2></div>';
    return;
  }

  const backlinks = (data.backlinks[docId] || []).filter(bl => !HIDDEN_DOC_IDS.has(bl.id));
  const tags = doc.tags || [];

  // Convert markdown to HTML
  let html = mdToHtmlWithIds(doc.content, doc.title);

  // Extract TOC from headings
  const toc = extractTOC(doc.content);

  // Linkify known document titles (skip hidden)
  for (const d of data.documents) {
    if (d.id === docId) continue;
    if (HIDDEN_DOC_IDS.has(d.id)) continue;
    const title = escRegex(d.title);
    const regex = new RegExp(`(${title})`, 'g');
    html = html.replace(regex, (match, p1) => {
      return `<span class="ai-link" onclick="openDoc('${d.id}')">${p1}</span>`;
    });
  }

  const docPageClass = tocCollapsed ? ' doc-page toc-collapsed' : 'doc-page';

  const tocHTML = `
    <div class="doc-toc">
      <button class="doc-toc-toggle" onclick="toggleToc()" data-tip="${tocCollapsed ? '展开目录' : '收起目录'}">${tocCollapsed ? '☰' : '≪'}</button>
      <div class="doc-toc-header">
        <h3>📑 文章导航</h3>
      </div>
      <div class="doc-toc-inner">
        ${toc.length > 0
          ? toc.map((h, i) => `
            <div class="toc-item toc-h${h.level}" onclick="scrollToHeading('h-${i}')" id="toc-h-${i}" data-fulltitle="${esc(h.title).replace(/"/g, '&quot;')}">
              ${esc(h.title)}
            </div>
          `).join('')
          : '<div style="color:var(--text-dim);font-size:12px;padding:0 10px;">暂无标题结构</div>'
        }
      </div>
    </div>
  `;

  document.getElementById('contentArea').innerHTML = `
    <div class="${docPageClass}">
      ${tocHTML}
      <div class="doc-content">
        <h1>${esc(doc.title)}</h1>
        <div class="doc-meta">
          ${tags.map(t => `<span class="tag">#${esc(t)}</span>`).join('')}
        </div>
        <div class="doc-body" id="docBody">${html}</div>
      </div>
      <div class="backlinks-panel">
        <h3>🔗 反向链接 (${backlinks.length})</h3>
        ${backlinks.length === 0
          ? '<div class="bl-empty">暂无反向链接<br><small>在文档中引用本文标题可建立链接</small></div>'
          : backlinks.map(bl => {
              const blDoc = data.documents.find(d => d.id === bl.id);
              const isFolder = blDoc && blDoc.isFolder;
              const action = isFolder ? `showGraphForDoc('${bl.id}')` : `openDoc('${bl.id}')`;
              const icon = bl.autoDetected ? '📎' : '🔗';
              const hint = isFolder ? '<span style="font-size:10px;color:var(--accent);margin-left:4px;">图谱</span>' : '';
              return `
            <div class="bl-item" onclick="${action}">
              ${icon} ${esc(bl.title)}${hint}
            </div>`;
            }).join('')
        }
      </div>
    </div>
  `;

  // TOC scroll spy — listen on doc-page (the scrollable container)
  setTimeout(() => {
    const docPage = document.querySelector('.doc-page');
    if (docPage) {
      docPage.addEventListener('scroll', updateTocActive);
    }
    // Add copy buttons to code blocks
    addCopyButtons();
    // Instant TOC tooltip — no delay
    setupTocTooltip();
  }, 100);

  document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));

  // Apply highlight if coming from RAG query
  if (highlightQuery) {
    setTimeout(() => applyHighlight(highlightQuery), 150);
  }
}

function extractTOC(content) {
  if (!content) return [];
  const toc = [];
  // Clean XML if needed
  let c = content;
  if (c.trim().startsWith('<')) {
    c = c.replace(/<title>.*?<\/title>/g, '').replace(/<[^>]+>/g, '\n');
  }
  const lines = c.split('\n');
  for (const line of lines) {
    const m2 = line.match(/^##\s+(.+)/);
    if (m2) { toc.push({ level: 2, title: m2[1].trim() }); continue; }
    const m3 = line.match(/^###\s+(.+)/);
    if (m3) { toc.push({ level: 3, title: m3[1].trim() }); continue; }
  }
  return toc;
}

function mdToHtmlWithIds(md, docTitle) {
  if (!md) return '';
  let c = md;
  // Handle XML content (fallback from sync)
  if (c.trim().startsWith('<')) {
    c = c.replace(/<title>.*?<\/title>/g, '').replace(/<[^>]+>/g, '\n')
         .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
         .replace(/&quot;/g, '"').replace(/\n{3,}/g, '\n\n').trim();
  }

  // Strip leading # Title if it matches docTitle (avoid duplication)
  if (docTitle) {
    const h1Pattern = new RegExp('^#\\s+' + escRegex(docTitle) + '\\s*\\n*', 'i');
    c = c.replace(h1Pattern, '');
  }

  // Use marked.js for proper Markdown rendering
  let html = '';
  try {
    if (typeof marked !== 'undefined' && marked.parse) {
      marked.setOptions({ breaks: true, gfm: true });
      html = marked.parse(c);
      // Strip any <h1> from HTML body — title is displayed separately, avoids duplication
      html = html.replace(/<h1[^>]*>[\s\S]*?<\/h1>/i, '');
    }
  } catch(e) {
    console.warn('marked failed, falling back');  
  }

  // Fallback: basic rendering if marked isn't available
  if (!html) {
    html = c.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
             .replace(/\n/g, '<br>');
  }

  // Add IDs to headings for TOC navigation
  let hIndex = 0;
  html = html.replace(/<h([1-3])([^>]*)>/g, (match, level, attrs) => {
    return `<h${level} id="h-${hIndex++}"${attrs}>`;
  });

  return html;
}

function scrollToHeading(id) {
  const el = document.getElementById(id);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    // Update active TOC item
    document.querySelectorAll('.toc-item').forEach(item => item.classList.remove('toc-active'));
    document.getElementById('toc-' + id)?.classList.add('toc-active');
  }
}

// Instant TOC tooltip — no browser title delay
function setupTocTooltip() {
  const tip = document.getElementById('tocTooltip');
  const toc = document.querySelector('.doc-toc');
  if (!tip || !toc) return;
  
  toc.addEventListener('mouseover', (e) => {
    const item = e.target.closest('.toc-item');
    if (!item) { tip.style.display = 'none'; return; }
    const title = item.getAttribute('data-fulltitle');
    if (!title) return;
    tip.textContent = title;
    tip.style.display = 'block';
  });
  
  toc.addEventListener('mousemove', (e) => {
    const item = e.target.closest('.toc-item');
    if (!item) { tip.style.display = 'none'; return; }
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top = (e.clientY - 10) + 'px';
  });
  
  toc.addEventListener('mouseout', (e) => {
    const item = e.target.closest('.toc-item');
    if (item && item.contains(e.relatedTarget)) return; // still inside same item
    tip.style.display = 'none';
  });
}

function updateTocActive() {
  const headings = document.querySelectorAll('[id^="h-"]');
  if (headings.length === 0) return;
  let currentId = headings[0].id;
  for (const h of headings) {
    const rect = h.getBoundingClientRect();
    if (rect.top <= 120) { currentId = h.id; }
  }
  document.querySelectorAll('.toc-item').forEach(item => {
    item.classList.toggle('toc-active', item.id === 'toc-' + currentId);
  });
}

// Add copy buttons to all <pre> code blocks in the doc body
function addCopyButtons() {
  const docBody = document.getElementById('docBody');
  if (!docBody) return;
  const pres = docBody.querySelectorAll('pre');
  pres.forEach(pre => {
    // Skip if already wrapped
    if (pre.parentElement.classList.contains('code-block-wrapper')) return;
    const wrapper = document.createElement('div');
    wrapper.className = 'code-block-wrapper';
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制';
    btn.addEventListener('click', () => {
      const code = pre.textContent || '';
      navigator.clipboard.writeText(code).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 已复制';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制';
        }, 2000);
      }).catch(err => {
        console.warn('Copy failed, using fallback:', err);
        // Fallback for older browsers
        const ta = document.createElement('textarea');
        ta.value = code;
        ta.style.position = 'fixed'; ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch(e) {}
        document.body.removeChild(ta);
        btn.classList.add('copied');
        btn.textContent = '已复制';
        setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '复制'; }, 2000);
      });
    });
    pre.parentNode.insertBefore(wrapper, pre);
    wrapper.appendChild(pre);
    wrapper.appendChild(btn);
  });
}

function applyHighlight(query) {
  if (!query) return;
  const docBody = document.getElementById('docBody');
  if (!docBody) { highlightQuery = ''; return; }

  const qWords = query.trim().split(/\s+/).filter(w => w.length >= 1);

  // Build regex that matches any of the query words
  const escapedWords = qWords.map(w => escRegex(w));
  const pattern = escapedWords.join('|');
  const regex = new RegExp(`(${pattern})`, 'gi');

  // Walk text nodes and wrap matches
  function highlightNode(node) {
    if (node.nodeType === 3) { // Text node
      const text = node.textContent;
      if (!regex.test(text)) return;
      regex.lastIndex = 0;
      const frag = document.createDocumentFragment();
      let lastIdx = 0;
      let match;
      while ((match = regex.exec(text)) !== null) {
        if (match.index > lastIdx) {
          frag.appendChild(document.createTextNode(text.substring(lastIdx, match.index)));
        }
        const mark = document.createElement('mark');
        mark.className = 'rag-highlight';
        mark.textContent = match[0];
        frag.appendChild(mark);
        lastIdx = regex.lastIndex;
        if (!match[0]) regex.lastIndex++;
      }
      if (lastIdx < text.length) {
        frag.appendChild(document.createTextNode(text.substring(lastIdx)));
      }
      node.parentNode.replaceChild(frag, node);
    } else if (node.nodeType === 1 && node.tagName !== 'SCRIPT' && node.tagName !== 'STYLE' && !node.classList.contains('ai-link')) {
      // Recurse into element children (but not links)
      for (let i = 0; i < node.childNodes.length; i++) {
        highlightNode(node.childNodes[i]);
      }
    }
  }

  highlightNode(docBody);

  // Scroll to first highlight
  const firstMark = docBody.querySelector('mark.rag-highlight');
  if (firstMark) {
    firstMark.classList.add('active-highlight');
    firstMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // Fade the active-highlight after 2 seconds
    setTimeout(() => {
      firstMark.classList.remove('active-highlight');
    }, 2500);
  }

  highlightQuery = '';
}

// FUZZY SEARCH
// ============================================================
function handleSearch(query) {
  const resultsDiv = document.getElementById('searchResults');
  const clearBtn = document.getElementById('searchClear');

  if (!query || query.trim().length < 1) {
    resultsDiv.classList.remove('show');
    clearBtn.classList.remove('visible');
    // If in graph mode, clear filter
    if (searchMode === 'graph' && graphFilter) {
      graphFilter = null;
      renderHomepage();
    }
    return;
  }

  clearBtn.classList.add('visible');
  const q = query.toLowerCase().trim();

  if (searchMode === 'graph') {
    // Graph mode: find matching nodes and show them + neighbors
    handleGraphSearch(q);
    return;
  }

  // Doc mode: existing behavior
  handleDocSearch(q);
}

function handleGraphSearch(q) {
  const resultsDiv = document.getElementById('searchResults');

  // Build connectivity map
  const connected = new Map();
  for (const e of data.graph.edges) {
    if (!connected.has(e.source)) connected.set(e.source, new Set());
    if (!connected.has(e.target)) connected.set(e.target, new Set());
    connected.get(e.source).add(e.target);
    connected.get(e.target).add(e.source);
  }
  function walkTreeConn(nodes, parentId) {
    for (const node of nodes) {
      if (parentId) {
        if (!connected.has(parentId)) connected.set(parentId, new Set());
        if (!connected.has(node.id)) connected.set(node.id, new Set());
        connected.get(parentId).add(node.id);
        connected.get(node.id).add(parentId);
      }
      if (node.children) walkTreeConn(node.children, node.id);
    }
  }
  walkTreeConn(data.tree, null);

  // Find matching documents
  const matchingIds = new Set();
  const results = [];
  for (const doc of data.documents) {
    if (HIDDEN_DOC_IDS.has(doc.id)) continue;
    if (doc.title.toLowerCase().includes(q) || doc.content.toLowerCase().includes(q)) {
      matchingIds.add(doc.id);
      results.push(doc);
    }
  }

  if (results.length === 0) {
    resultsDiv.innerHTML = '<div class="no-results">未找到匹配的图谱节点</div>';
    resultsDiv.classList.add('show');
    // Still clear graph filter
    graphFilter = null;
    renderHomepage();
    return;
  }

  // Compute visible: matching + 1-hop neighbors
  const visibleIds = new Set(matchingIds);
  for (const mid of matchingIds) {
    const neighbors = connected.get(mid);
    if (neighbors) {
      for (const nid of neighbors) visibleIds.add(nid);
    }
  }

  graphFilter = { visibleIds, highlightedIds: matchingIds };

  // Show search results as list with highlighted snippets
  resultsDiv.innerHTML = results.map(r => {
    let snippet = '';
    const contentLower = r.content.toLowerCase();
    const idx = contentLower.indexOf(q);
    if (idx >= 0) {
      const start = Math.max(0, idx - 30);
      const end = Math.min(r.content.length, idx + q.length + 60);
      snippet = (start > 0 ? '...' : '') + r.content.substring(start, end) + (end < r.content.length ? '...' : '');
      const regex = new RegExp(`(${escRegex(q)})`, 'gi');
      snippet = esc(snippet).replace(regex, '<em>$1</em>');
    } else {
      snippet = esc(r.summary.substring(0, 80));
    }
    return `
    <div class="search-result-item" onclick="showGraphForDoc('${r.id}');hideSearch();">
      <div class="result-title">${esc(r.title)} <span style="font-size:11px;color:var(--accent);">图谱</span></div>
      <div class="result-snippet">${snippet}</div>
    </div>
    `;
  }).join('');
  resultsDiv.classList.add('show');

  // Rerender graph with filter
  if (!data || data.graph.nodes.length === 0) return;
  renderHomepage();
}

function handleDocSearch(q) {
  const resultsDiv = document.getElementById('searchResults');
  const results = [];

  for (const doc of data.documents) {
    if (HIDDEN_DOC_IDS.has(doc.id)) continue;
    const titleMatch = fuzzyMatch(doc.title.toLowerCase(), q);
    const contentMatch = fuzzyMatch(doc.content.toLowerCase(), q);

    if (titleMatch.score > 0.2 || contentMatch.score > 0.3) {
      let snippet = '';
      const contentLower = doc.content.toLowerCase();
      const idx = contentLower.indexOf(q);
      if (idx >= 0) {
        const start = Math.max(0, idx - 30);
        const end = Math.min(doc.content.length, idx + q.length + 60);
        snippet = (start > 0 ? '...' : '') + doc.content.substring(start, end) + (end < doc.content.length ? '...' : '');
        const regex = new RegExp(`(${escRegex(q)})`, 'gi');
        snippet = esc(snippet).replace(regex, '<em>$1</em>');
      } else {
        snippet = doc.summary.substring(0, 100);
      }

      results.push({ doc, score: Math.max(titleMatch.score, contentMatch.score), snippet });
    }
  }

  results.sort((a, b) => b.score - a.score);

  if (results.length === 0) {
    resultsDiv.innerHTML = '<div class="no-results">未找到匹配的文档</div>';
  } else {
    resultsDiv.innerHTML = results.map(r => `
      <div class="search-result-item" onclick="openDoc('${r.doc.id}');hideSearch();">
        <div class="result-title">${esc(r.doc.title)}</div>
        <div class="result-snippet">${r.snippet}</div>
      </div>
    `).join('');
  }
  resultsDiv.classList.add('show');
}

function hideSearch() {
  document.getElementById('searchResults').classList.remove('show');
}

function resetSearch() {
  const input = document.getElementById('searchInput');
  input.value = '';
  hideSearch();
  document.getElementById('searchClear').classList.remove('visible');
  if (searchMode === 'graph' && graphFilter) {
    graphFilter = null;
    renderHomepage();
  }
  input.focus();
}

// Simple fuzzy match (substring + Levenshtein-inspired scoring)
function fuzzyMatch(text, query) {
  if (!text || !query) return { score: 0 };

  // Exact substring match
  if (text.includes(query)) {
    return { score: 0.9 };
  }

  // Word-by-word matching
  const queryWords = query.split(/\s+/).filter(w => w.length > 0);
  const textWords = text.split(/\s+/);

  let score = 0;
  let matchedChars = 0;

  for (const qw of queryWords) {
    if (qw.length < 2) continue;
    // Check if any text word starts with the query
    for (const tw of textWords) {
      if (tw.startsWith(qw)) {
        score += 0.6;
        matchedChars += qw.length;
        break;
      }
      if (tw.includes(qw)) {
        score += 0.4;
        matchedChars += qw.length;
        break;
      }
    }
    // Character-level fuzzy match
    if (score === 0) {
      let qi = 0;
      for (let ti = 0; ti < text.length && qi < qw.length; ti++) {
        if (text[ti] === qw[qi]) { qi++; }
      }
      if (qi === qw.length) {
        score += 0.25;
      } else if (qi >= qw.length * 0.7) {
        score += 0.15;
      }
    }
  }

  // Normalize
  const maxScore = queryWords.length * 0.6;
  return { score: maxScore > 0 ? Math.min(1, score / maxScore) : 0 };
}

// ============================================================
// UTILITIES
// ============================================================
function esc(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ============================================================
// RAG KNOWLEDGE ASSISTANT
// ============================================================
let ragChunks = [];
let highlightQuery = '';

function buildRagIndex() {
  ragChunks = [];
  for (const doc of data.documents) {
    if (doc.isFolder) continue;
    if (HIDDEN_DOC_IDS.has(doc.id)) continue;
    let content = doc.content;
    if (content.trim().startsWith('<')) {
      content = content.replace(/<title>.*?<\/title>/g, '').replace(/<[^>]+>/g, '\n');
    }
    const paragraphs = content.split(/\n\n+/).map(p => p.trim()).filter(p => p.length > 30);
    for (const para of paragraphs) {
      ragChunks.push({ text: para, docTitle: doc.title, docId: doc.id });
    }
    const sections = content.split(/\n(?=#{1,3}\s)/);
    for (const sec of sections) {
      const trimmed = sec.trim();
      if (trimmed.length > 50 && !ragChunks.some(c => c.text === trimmed)) {
        ragChunks.push({ text: trimmed, docTitle: doc.title, docId: doc.id });
      }
    }
  }
}

function searchRag(query) {
  if (!query || query.trim().length < 2) return [];
  const q = query.toLowerCase().trim();
  const qWords = q.split(/\s+/).filter(w => w.length >= 3); // 只考虑3字以上的词，避免停用词干扰

  // 提取关键词作为硬性过滤条件
  const keywords = extractKeywords(query);
  const kwLower = keywords.map(k => k.toLowerCase()).filter(k => k.length >= 2);

  // 如果没有提取到有效关键词（非常模糊的问题），必须全句匹配
  const hasKeywords = kwLower.length > 0;

  const scored = ragChunks.map(chunk => {
    const textLower = chunk.text.toLowerCase();
    let score = 0;
    let keywordMatched = false;

    // 核心规则：关键词精确匹配——最强信号
    for (const kw of kwLower) {
      if (textLower.includes(kw)) {
        score += 12;
        keywordMatched = true;
      }
      // 标题中包含关键词也是强信号
      if (chunk.docTitle.toLowerCase().includes(kw)) {
        score += 5;
        keywordMatched = true;
      }
    }

    // 整句完全匹配
    if (q.length >= 3 && textLower.includes(q)) score += 8;

    // 词汇级匹配（仅3字以上）
    for (const w of qWords) {
      if (textLower.includes(w)) score += 3;
      if (chunk.docTitle.toLowerCase().includes(w)) score += 2;
    }

    // 模糊字符匹配（仅在没有其他匹配时作为兜底）
    if (score === 0 && q.length >= 4) {
      let qi = 0;
      for (let ti = 0; ti < textLower.length && qi < q.length; ti++) {
        if (textLower[ti] === q[qi]) qi++;
      }
      if (qi >= q.length * 0.9) score += 2; // 提高到90%匹配
    }

    return { ...chunk, score, keywordMatched };
  });

  // 严格过滤：
  // 1. 如果有提取到关键词，必须有关键词匹配
  // 2. 分数门槛提高到 5（之前是 1.5，太低了）
  const minScore = hasKeywords ? 5 : 10;

  let filtered = scored.filter(c => {
    if (c.score < minScore) return false;
    // 有明确关键词时，强制要求关键词匹配
    if (hasKeywords && !c.keywordMatched) return false;
    return true;
  });

  return filtered.sort((a, b) => b.score - a.score).slice(0, 5);
}

function extractDefinitionContent(text, keywords) {
  if (!text) return '';

  // 切句子
  const sentences = text.split(/(?<=[。！？；\n])/g).map(s => s.trim()).filter(s => s.length > 6);
  if (sentences.length === 0) return esc(text.substring(0, 300));

  // 扩展同义词：用户问"LLM"，也要匹配"大模型"、"大语言模型"
  const mainKw = keywords.length > 0 ? keywords[0] : '';
  const searchTerms = mainKw ? expandSearchTerms(mainKw) : [];
  const allKws = [...new Set([...keywords.map(k => k.toLowerCase()), ...searchTerms])];

  // 为每句话打分
  const scored = sentences.map((s, idx) => {
    const lower = s.toLowerCase();
    let score = 0;
    for (const kw of allKws) {
      if (lower.includes(kw)) score += 4;
    }
    // 定义类标记加权
    if (/是[一]?[种个项类位套]/.test(s)) score += 3;
    if (/(?:指的是|即为|定义为|又称|也叫|即[^使便])/.test(s)) score += 3;
    if (/全称|简称/.test(s)) score += 2;
    if (/概念|含义|意思是|本质上|英文|缩写/.test(s)) score += 1;
    // 靠前的句子更有可能是定义
    if (idx < 5) score += 1;
    return { text: s, score, idx };
  });

  // 取相关句子（分数≥3），最多取8个，按原文顺序排列
  const relevant = scored.filter(s => s.score >= 3).slice(0, 8);
  if (relevant.length === 0) {
    // fallback：取前400字
    return esc(text.substring(0, 400));
  }

  // 按原文顺序排列
  relevant.sort((a, b) => a.idx - b.idx);

  // 格式化并高亮
  return relevant.map(s => {
    let display = esc(s.text);
    // 高亮所有匹配的术语（按长度降序避免覆盖）
    const uniqueTerms = [...new Set(allKws.filter(kw => s.text.toLowerCase().includes(kw)))]
      .sort((a, b) => b.length - a.length);
    for (const kw of uniqueTerms) {
      const regex = new RegExp(`(${escRegex(kw)})`, 'gi');
      display = display.replace(regex, '<strong class="kw-highlight">$1</strong>');
    }
    return display;
  }).join('');
}

function extractRelevantParagraph(text, query) {
  const qWords = query.toLowerCase().trim().split(/\s+/).filter(w => w.length >= 2);
  const qLower = query.toLowerCase().trim();

  // Split into paragraphs by double newlines or headings
  const paragraphs = text.split(/\n\n+|(?=\n#{2,3}\s)/).map(p => p.trim()).filter(p => p.length > 20);

  // Score paragraphs by relevance
  const scored = paragraphs.map(p => {
    const lower = p.toLowerCase();
    let sScore = 0;
    // Full query match is strongest
    if (lower.includes(qLower)) sScore += 10;
    // Word matches
    for (const w of qWords) {
      if (lower.includes(w)) sScore += 2;
    }
    // Prefer paragraphs with definition keywords (helps with "什么是X" queries)
    const definitionMarkers = ['是', '指', '称为', '定义', '指代', '概念', '全称是', '英文'];
    for (const marker of definitionMarkers) {
      if (lower.includes(marker)) sScore += 1;
    }
    return { text: p, score: sScore };
  });

  const relevant = scored.filter(s => s.score > 0);

  if (relevant.length === 0) {
    // Fallback: first meaningful paragraph
    const first = paragraphs.find(p => p.length > 50);
    return first ? esc(first.substring(0, 400)) : '';
  }

  // Take top 3 paragraphs, preserving order
  return relevant.slice(0, 3).map(s => esc(s.text)).join('<br><br>');
}

// ============================================================
// KEYWORD EXTRACTION — 从用户提问中提取核心关键词
// ============================================================
function extractKeywords(query) {
  const q = query.trim();
  if (!q) return [];

  // 匹配模式：什么是X 或 X是什么 → 关键词 = X
  let m = q.match(/什么是(.+?)(?:[?？。]|$)/);
  if (m) return [m[1].trim()];

  m = q.match(/(.+?)是什么(?:意思|含义)?/);
  if (m) return [m[1].trim()];

  m = q.match(/(.+?)指(?:的是|的)?什么/);
  if (m) return [m[1].trim()];

  m = q.match(/(.+?)的定义/);
  if (m) return [m[1].trim()];

  // 介绍一下X / 解释一下X / 说说X
  m = q.match(/(?:介绍|解释|说说|讲讲)(?:一下)?(.+)/);
  if (m) return [m[1].trim()];

  // X和Y的区别/对比/差异
  m = q.match(/(.+?)(?:和|与|跟|同|vs\.?|VS\.?)(.+?)(?:的区别|对比|比较|差异|有什么不同)/i);
  if (m) return [m[1].trim(), m[2].trim()];

  // 去掉常见疑问词和停用词，提取实体词
  const stopPattern = /^(?:请问|问一下|我想知道|帮我|告诉我|什么是|是谁|什么叫|如何|怎么|怎么样|为什么|哪些|哪个|在哪|什么时候|可以|能|会|有没有|有|在|的|了|吗|呢|吧|啊|哦|嗯|是|什么|请问一下|我想问)/;
  let cleaned = q;
  // 反复去掉前缀停用词
  let prev = '';
  while (prev !== cleaned) {
    prev = cleaned;
    cleaned = cleaned.replace(stopPattern, '').trim();
  }
  // 去掉后缀
  cleaned = cleaned.replace(/[?？。！!、]$/, '').trim();

  if (!cleaned || cleaned.length < 1) return [q.trim()];

  // 提取英文缩写/词汇（优先）
  const engMatches = cleaned.match(/[A-Za-z][A-Za-z0-9._-]{1,}/g);
  if (engMatches && engMatches.length > 0) {
    // 过滤掉太短的（单个字母）
    const valid = engMatches.filter(w => w.length >= 2);
    if (valid.length > 0) return valid.slice(0, 3);
  }

  // 中文分词：基于常见AI术语词典切分
  const aiTerms = [
    '大语言模型', '语言模型', '机器学习', '深度学习', '神经网络', '自然语言处理',
    '注意力机制', '自注意力', '多头注意力', '残差连接', '层归一化', '前馈网络',
    '位置编码', '词嵌入', '词向量', '分词器', '编码器', '解码器',
    '损失函数', '梯度下降', '反向传播', '激活函数', '正则化', '过拟合',
    '强化学习', '迁移学习', '微调', '预训练', '有监督学习', '无监督学习',
    '卷积神经网络', '循环神经网络', '生成对抗网络', '变分自编码器',
    '知识图谱', '语义理解', '文本生成', '情感分析', '命名实体识别',
    '提示工程', '思维链', '上下文学习', '少样本学习', '零样本',
    '扩散模型', '文生图', '文生视频', '多模态', '向量数据库',
  ];
  for (const term of aiTerms) {
    if (cleaned.includes(term)) return [term];
  }

  // 通用：去掉剩余停用词，返回长的词
  const genStops = ['的', '了', '吗', '呢', '吧', '啊', '哦', '嗯', '是', '什么', '怎么', '如何',
    '为什么', '哪些', '哪个', '请问', '可以', '能', '会', '有', '在', '和', '与', '或',
    '我', '你', '他', '她', '它', '们', '这', '那', '哪', '一', '个', '些',
    '不', '就', '也', '都', '还', '要', '把', '被', '让', '给', '对', '从', '到'];
  let tk = cleaned;
  for (const sw of genStops) {
    tk = tk.replace(new RegExp(sw, 'g'), ' ');
  }
  const words = tk.split(/\s+/).filter(w => w.length >= 2);
  return words.length > 0 ? words.slice(0, 3) : [q.trim()];
}
